databases:
  - name: workout-postgres
    plan: free
    databaseName: workout_bot
    user: workout_bot

services:
  - type: web
    name: workout-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e '.[dev]'
    startCommand: alembic upgrade head && uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: workout-postgres
          property: connectionString
      - key: WEBAPP_URL
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: WEBAPP_AUTH_TTL_SECONDS
        value: "900"
      - key: WEBAPP_ACCESS_TOKEN_TTL_SECONDS
        value: "900"
      - key: LOG_LEVEL
        value: INFO

  - type: worker
    name: workout-bot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e '.[dev]'
    startCommand: alembic upgrade head && python -m bot.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: workout-postgres
          property: connectionString
      - key: WEBAPP_URL
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: WEBAPP_AUTH_TTL_SECONDS
        value: "900"
      - key: WEBAPP_ACCESS_TOKEN_TTL_SECONDS
        value: "900"
      - key: LOG_LEVEL
        value: INFO
